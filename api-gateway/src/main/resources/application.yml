server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: masterdata-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/masterdata/**
        - id: recruitment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/recruitment/**
        - id: candidate-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/candidate/**
        - id: interview-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/interview/**
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notification/**