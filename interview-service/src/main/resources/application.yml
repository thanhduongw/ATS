server:
  port: 8085

spring:
  application:
    name: interview-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ats_interview
    username: ats_user
    password: ats_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true